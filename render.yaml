services:
  - type: web
    name: chat-restaurant-recommender-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run db:migrate:deploy --workspace server && npm run db:seed --workspace server && npm run build --workspace server
    startCommand: npm run start --workspace server
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: auto
      - key: JWT_SECRET
        generateValue: true
